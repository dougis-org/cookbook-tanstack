version: "1.0.0"
created_by: "verity-setup"

knowledge_spec:
  project_name: "cookbook-tanstack"
  languages: [typescript, javascript]
  frameworks: [react, tanstack-start, tanstack-router, mongoose, better-auth, trpc, vite]
  architecture: monolith
  build_system: npm
  test_framework: vitest

quality_dimensions:
  - id: comprehensibility
    description: "Code readable in one context load"
    signals:
      - metric: file_length
        threshold: 300
        unit: lines
        rationale: "AI context windows degrade on large files"
      - metric: cyclomatic_complexity
        threshold: 15
        unit: per_function
        rationale: "Complexity-aware feedback improves AI performance by 35.71%"
      - metric: function_length
        threshold: 50
        unit: lines
        rationale: "Short functions are easier for agents to modify safely"
      - metric: naming_quality
        tool: ai
        rationale: "Descriptive names improve AI comprehension by 2x"

  - id: modularity
    description: "Modify one concern without touching 3+ files"
    signals:
      - metric: single_responsibility
        tool: ai
        rationale: "AI performance drops sharply at 3+ files per change"
      - metric: shallow_abstractions
        tool: ai
        rationale: "LLMs struggle with deep inheritance hierarchies"

  - id: type_safety
    description: "Type system catches errors before runtime"
    signals:
      - metric: strict_types
        languages: [typescript]
        rationale: ">50% reduction in compilation errors with type constraints"
        rules_by_language:
          typescript:
            tool: eslint
            rules:
              - "@typescript-eslint/no-explicit-any"
              - "@typescript-eslint/no-unsafe-assignment"
              - "@typescript-eslint/no-unsafe-call"
              - "@typescript-eslint/no-unsafe-return"

  - id: test_adequacy
    description: "Tests define expected behavior for agents"
    signals:
      - metric: test_coverage
        threshold: 80
        unit: percent
        ai_threshold: 90
        rationale: "90% recommended for AI-generated code"
      - metric: test_quality
        tool: ai
        rationale: "Tests are the primary safety net for AI agents"

security_patterns:
  - id: no-hardcoded-secrets
    description: "No secrets, API keys, passwords, or tokens in source code"
    severity: critical
    cwe: [CWE-798]
    enforced_by:
      - tool: Trivy
        config:
          scanners: [secret]
      - tool: Semgrep
        rules: [generic.secrets]

  - id: input-sanitization
    description: "All user input validated and sanitized before use"
    severity: critical
    cwe: [CWE-20, CWE-80, CWE-89, CWE-117]
    enforced_by:
      - tool: Semgrep
        rules:
          - javascript.lang.security.audit.unsafe-html

  - id: parameterized-queries
    description: "Database queries use parameters, never string concatenation"
    severity: critical
    cwe: [CWE-89]
    enforced_by:
      - tool: Semgrep
        rules:
          - javascript.lang.security.audit.sqli

  - id: dependency-verification
    description: "No known-vulnerable dependencies"
    severity: high
    cwe: [CWE-1395]
    enforced_by:
      - tool: Trivy
        config:
          scanners: [vuln]
          severity: [HIGH, CRITICAL]

  - id: no-unsafe-deserialization
    description: "No unsafe deserialization of untrusted data"
    severity: high
    cwe: [CWE-502]
    enforced_by: []

  - id: access-control-checks
    description: "Authorization verified on all sensitive operations"
    severity: high
    cwe: [CWE-639]
    enforced_by: []

  - id: config-file-integrity
    description: "Configuration files not manipulable by untrusted input"
    severity: high
    cwe: [CWE-15]
    enforced_by: []

custom_patterns:
  - id: better-auth-session-verification
    description: "All tRPC procedures and server functions handling user data must verify auth session before processing"
    severity: high
    enforced_by: []
    rationale: "Project uses Better-Auth; unguarded procedures expose user data and violate CWE-639"

  - id: mongoose-no-string-interpolation-queries
    description: "MongoDB queries via Mongoose must use filter objects, not string interpolation or template literals in query fields"
    severity: critical
    enforced_by:
      - tool: Semgrep
        rules: [javascript.lang.security.audit.sqli]
    rationale: "NoSQL injection risk; all queries must use parameterized Mongoose filter syntax"

  - id: tanstack-route-export-pattern
    description: "Every route file must export a Route object via createFileRoute and a named page component"
    severity: low
    enforced_by: []
    rationale: "TanStack Router requires this pattern; missing exports cause silent routing failures"

  - id: theme-token-usage
    description: "UI components must use var(--theme-*) CSS tokens, never hard-coded hex/slate/cyan color values"
    severity: low
    enforced_by: []
    rationale: "App supports 4 themes (dark, dark-greens, light-cool, light-warm); hard-coded colors break non-dark themes"

  - id: db-singleton-access
    description: "MONGODB_URI and MongoDB connections must only be accessed via the db singleton in src/db/index.ts, not directly in route handlers or components"
    severity: high
    enforced_by: []
    rationale: "Prevents connection leaks and ensures consistent global strict mode across all DB access"

process_constraints:
  self_healing_limit: 2
  analysis_mode: balanced

  compound_enabled: true
  memory_graph_enabled: true
  memory_graph_budget_tokens: 2000
  knowledge_injection_budget_tokens: 2000
  finding_autosuppress_threshold: 2

  intent_fail_threshold: 4
  intent_warn_threshold: 7

  exclude_paths:
    - node_modules
    - dist
    - build
    - .git
    - vendor
    - coverage
    - .tanstack

tool_configuration:
  eslint:
    enabled: true
    config_file: ".codacy/tools-configs/eslint.config.mjs"
  semgrep:
    enabled: true
    config_file: ".codacy/tools-configs/semgrep.yaml"
  trivy:
    enabled: true
    config_file: ".codacy/tools-configs/trivy.yaml"
