name: Build and Test

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping runs per PR / ref
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-unit:
    # Skip on draft PRs
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      BETTER_AUTH_SECRET: ci-test-secret-do-not-use-in-production
      BETTER_AUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.sha || github.ref }}
          token: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && secrets.WORKFLOW_PAT || github.token }}

      - name: Detect automation-triggered lockfile update
        run: |
          commit_msg="$(git show -s --format=%B)"
          echo "Detected commit message: $commit_msg"
          if echo "$commit_msg" | grep -q "\[ci-auto-lock-update\]"; then
            echo "CI_UPDATED_LOCKFILE=true" >> "$GITHUB_ENV"
          else
            echo "CI_UPDATED_LOCKFILE=false" >> "$GITHUB_ENV"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Commit updated lock file
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        env:
          HEAD_REF: ${{ github.head_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update package-lock.json [ci-auto-lock-update]"
            git push origin HEAD:"$HEAD_REF" \
              --force-with-lease=refs/heads/"$HEAD_REF":"$HEAD_SHA"
          else
            echo "package-lock.json is already up to date"
          fi

      - name: Build
        run: npm run build

      - name: Run unit tests with coverage
        run: npm run test:unit -- --coverage

      - name: Upload build output
        uses: actions/upload-artifact@v6
        with:
          name: build-output
          path: .output
          retention-days: 1
          include-hidden-files: true

      - name: Upload coverage to Codacy
        if: always()
        continue-on-error: true
        uses: dougis-org/cicd-tooling/.github/actions/codacy-reporter@main
        with:
          codacy-api-token: ${{ secrets.CODACY_API_TOKEN }}
          codacy-username: dougis-org
          codacy-project-name: cookbook-tanstack
          coverage-file: coverage/lcov.info

  integration:
    needs: build-and-unit
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      BETTER_AUTH_SECRET: ci-test-secret-do-not-use-in-production
      BETTER_AUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run integration tests with coverage
        run: npm run test:integration -- --coverage

      - name: Upload coverage to Codacy
        if: always()
        continue-on-error: true
        uses: dougis-org/cicd-tooling/.github/actions/codacy-reporter@main
        with:
          codacy-api-token: ${{ secrets.CODACY_API_TOKEN }}
          codacy-username: dougis-org
          codacy-project-name: cookbook-tanstack
          coverage-file: coverage/lcov.info

  e2e:
    needs: build-and-unit
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      MONGODB_URI: mongodb://localhost:27017/cookbook
      BETTER_AUTH_SECRET: ci-test-secret-do-not-use-in-production
      BETTER_AUTH_URL: http://localhost:3000
      PLAYWRIGHT_CI_WORKERS: 2
      PLAYWRIGHT_RUNTIME_REPORT: playwright-report/results.json

    steps:
      - name: Start MongoDB replica set
        run: |
          docker run -d --name mongodb -p 27017:27017 mongo:7 --replSet rs0 --bind_ip_all
          echo "Waiting for MongoDB to be ready..."
          timeout 60 bash -c 'until docker exec mongodb mongosh --eval "db.adminCommand(\"ping\")" --quiet 2>/dev/null; do sleep 2; done'
          docker exec mongodb mongosh --eval "rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]})"
          echo "Waiting for replica set to elect primary..."
          timeout 30 bash -c 'until docker exec mongodb mongosh --eval "rs.isMaster().ismaster" --quiet 2>/dev/null | grep -q true; do sleep 1; done'

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Download build output
        uses: actions/download-artifact@v6
        with:
          name: build-output
          path: .output

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chrome

      - name: Seed database
        run: npm run db:seed

      - name: Warm up production server
        run: |
          # Start the server in the background
          PORT=3000 node .output/server/index.mjs &
          SERVER_PID=$!

          # Wait for the server to start and health endpoint to return 200
          echo "Waiting for server health check..."
          timeout 60 bash -c 'until curl -sf http://localhost:3000/api/health > /dev/null; do sleep 1; done'
          echo "Server ready."

          # Verify server process is still alive
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "Server process died during warmup (PID: $SERVER_PID)"
            exit 1
          fi

          # Warm up the SSR bundle with a page route request
          curl -sf http://localhost:3000/ > /dev/null

          # Server continues running in the background for Playwright to reuse
          wait $SERVER_PID &

      - name: Run E2E tests
        env:
          CI: true
        run: npm run test:e2e
        timeout-minutes: 10

      - name: Run Playwright runtime summary
        if: always()
        run: node scripts/ci/report-playwright-runtime.mjs

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

      - name: Upload coverage to Codacy
        if: always()
        continue-on-error: true
        uses: dougis-org/cicd-tooling/.github/actions/codacy-reporter@main
        with:
          codacy-api-token: ${{ secrets.CODACY_API_TOKEN }}
          codacy-username: dougis-org
          codacy-project-name: cookbook-tanstack
          coverage-file: e2e-coverage/lcov.info

  finalize-coverage:
    needs: [build-and-unit, integration, e2e]
    if: always() && needs.build-and-unit.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Finalize coverage on Codacy
        continue-on-error: true
        uses: dougis-org/cicd-tooling/.github/actions/codacy-reporter@main
        with:
          codacy-api-token: ${{ secrets.CODACY_API_TOKEN }}
          codacy-username: dougis-org
          codacy-project-name: cookbook-tanstack
          final: 'true'

  notify-status:
    needs: [build-and-unit, integration, e2e]
    # Only run when build-and-unit actually resolved to success or failure.
    # On draft PRs, build-and-unit (and its dependents, which have no if of
    # their own and inherit its skip) are intentionally skipped via
    # build-and-unit's own `if:`. We check `needs.build-and-unit.result !=
    # 'skipped'` explicitly rather than the success()/failure() status-check
    # functions: those can evaluate true even when a needed job was skipped
    # (skipped is not "failed"), which would let this job run - and post a
    # spurious "build failed" comment - on a draft PR.
    if: github.event_name == 'pull_request' && needs.build-and-unit.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      # PR comments live under the Issues API (listComments/createComment/
      # updateComment/deleteComment); pull-requests: write isn't needed.
      issues: write
    steps:
      - name: Manage build-status PR comment
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            // MARKER anchors the single bot-managed status comment so it can
            // be found, updated in place, or deleted, instead of posting a
            // new comment on every run. MAX_ENTRIES caps how much failure
            // history that comment keeps so it can't grow unbounded across
            // repeat failures.
            const MARKER = '<!-- build-and-test-status -->';
            const MAX_ENTRIES = 5;

            // Read the needed jobs' results directly. success()/failure()
            // reflect this *job's own* previous steps (there are none here -
            // this is the first step), not the outcome of `needs`, so they
            // cannot be used to detect the build/test result from inside the
            // script.
            const success =
              '${{ needs.build-and-unit.result }}' === 'success' &&
              '${{ needs.integration.result }}' === 'success' &&
              '${{ needs.e2e.result }}' === 'success';

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            try {
              // Stop paginating as soon as the marker comment is found
              // instead of always fetching every comment page.
              let existing;
              for await (const { data: page } of github.paginate.iterator(
                github.rest.issues.listComments,
                { owner, repo, issue_number, per_page: 100 },
              )) {
                existing = page.find((c) => c.body?.startsWith(MARKER));
                if (existing) break;
              }

              if (success) {
                if (existing) {
                  await github.rest.issues.deleteComment({
                    owner,
                    repo,
                    comment_id: existing.id,
                  });
                }
                return;
              }

              const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
              const timestamp = new Date().toISOString();
              // Each entry is wrapped in a paired `<!-- entry:RUN_ID -->` tag
              // (RUN_ID = context.runId, stable across re-runs of the same
              // workflow run) so the regex below can locate and remove it as
              // a whole block.
              const newEntry = `<!-- entry:${context.runId} -->\n**${timestamp}** — [run #${context.runNumber}](${runUrl}) failed\n<!-- entry:${context.runId} -->`;

              let entries = [];
              if (existing) {
                const entryBlockPattern = /<!-- entry:[^>]*-->[\s\S]*?<!-- entry:[^>]*-->/g;
                entries = existing.body.match(entryBlockPattern) ?? [];
              }
              // Drop any prior entry for this same run (e.g. a re-run of a
              // previously failed attempt) so retries update in place instead
              // of consuming multiple slots in the MAX_ENTRIES history.
              const currentRunMarker = `<!-- entry:${context.runId} -->`;
              entries = entries.filter((entry) => !entry.startsWith(currentRunMarker));
              entries.unshift(newEntry);
              entries = entries.slice(0, MAX_ENTRIES);

              const body = `${MARKER}\nBuild and test workflow failed (most recent first)\n\n${entries.join('\n\n')}`;

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
              }
            } catch (error) {
              // continue-on-error keeps bookkeeping failures from affecting
              // the required build/test check, but that also hides the
              // failure from the check status entirely - log it so it's
              // still visible in this job's annotations.
              core.warning(`notify-status: failed to manage PR comment: ${error.message}`);
            }
