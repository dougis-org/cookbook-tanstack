name: Build and Test

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping runs per PR / ref
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  ci-fast:
    # Skip on draft PRs
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      BETTER_AUTH_SECRET: ci-test-secret-do-not-use-in-production
      BETTER_AUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.sha || github.ref }}
          token: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && secrets.WORKFLOW_PAT || github.token }}

      - name: Detect automation-triggered lockfile update
        run: |
          commit_msg="$(git show -s --format=%B)"
          echo "Detected commit message: $commit_msg"
          if echo "$commit_msg" | grep -q "\[ci-auto-lock-update\]"; then
            echo "CI_UPDATED_LOCKFILE=true" >> "$GITHUB_ENV"
          else
            echo "CI_UPDATED_LOCKFILE=false" >> "$GITHUB_ENV"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Commit updated lock file
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        env:
          HEAD_REF: ${{ github.head_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update package-lock.json [ci-auto-lock-update]"
            git push origin HEAD:"$HEAD_REF" \
              --force-with-lease=refs/heads/"$HEAD_REF":"$HEAD_SHA"
          else
            echo "package-lock.json is already up to date"
          fi

      - name: Build
        run: npm run build

      - name: Run unit tests with coverage
        run: npm run test:unit -- --coverage

      - name: Upload build output
        uses: actions/upload-artifact@v6
        with:
          name: build-output
          path: .output
          retention-days: 1
          include-hidden-files: true

      - name: Upload coverage to Codacy
        if: always()
        continue-on-error: true
        uses: ./.github/actions/codacy-reporter
        with:
          codacy-api-token: ${{ secrets.CODACY_API_TOKEN }}
          coverage-file: coverage/lcov.info

  ci-integration:
    needs: ci-fast
    timeout-minutes: 15
    runs-on: ubicloud-standard-2
    env:
      BETTER_AUTH_SECRET: ci-test-secret-do-not-use-in-production
      BETTER_AUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run integration tests with coverage
        run: npm run test:integration -- --coverage

      - name: Upload coverage to Codacy
        if: always()
        continue-on-error: true
        uses: ./.github/actions/codacy-reporter
        with:
          codacy-api-token: ${{ secrets.CODACY_API_TOKEN }}
          coverage-file: coverage/lcov.info

  ci-e2e:
    needs: ci-fast
    timeout-minutes: 30
    runs-on: ubicloud-standard-2
    env:
      MONGODB_URI: mongodb://localhost:27017/cookbook
      BETTER_AUTH_SECRET: ci-test-secret-do-not-use-in-production
      BETTER_AUTH_URL: http://localhost:3000
      PLAYWRIGHT_CI_WORKERS: 2
      PLAYWRIGHT_RUNTIME_REPORT: playwright-report/results.json

    steps:
      - name: Start MongoDB replica set
        run: |
          docker run -d --name mongodb -p 27017:27017 mongo:7 --replSet rs0 --bind_ip_all
          echo "Waiting for MongoDB to be ready..."
          timeout 60 bash -c 'until docker exec mongodb mongosh --eval "db.adminCommand(\"ping\")" --quiet 2>/dev/null; do sleep 2; done'
          docker exec mongodb mongosh --eval "rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]})"
          echo "Waiting for replica set to elect primary..."
          timeout 30 bash -c 'until docker exec mongodb mongosh --eval "rs.isMaster().ismaster" --quiet 2>/dev/null | grep -q true; do sleep 1; done'

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Download build output
        uses: actions/download-artifact@v6
        with:
          name: build-output
          path: .output

      - name: Install Playwright system dependencies
        run: DEBIAN_FRONTEND=noninteractive npx playwright install-deps chrome

      - name: Seed database
        run: npm run db:seed

      - name: Warm up production server
        run: |
          # Start the server in the background
          PORT=3000 node .output/server/index.mjs &
          SERVER_PID=$!

          # Wait for the server to start and health endpoint to return 200
          echo "Waiting for server health check..."
          timeout 60 bash -c 'until curl -sf http://localhost:3000/api/health > /dev/null; do sleep 1; done'
          echo "Server ready."

          # Verify server process is still alive
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "Server process died during warmup (PID: $SERVER_PID)"
            exit 1
          fi

          # Warm up the SSR bundle with a page route request
          curl -sf http://localhost:3000/ > /dev/null

          # Server continues running in the background for Playwright to reuse
          wait $SERVER_PID &

      - name: Run E2E tests
        env:
          CI: true
        run: npm run test:e2e
        timeout-minutes: 10

      - name: Run Playwright runtime summary
        if: always()
        run: node scripts/ci/report-playwright-runtime.mjs

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

      - name: Upload coverage to Codacy
        if: always()
        continue-on-error: true
        uses: ./.github/actions/codacy-reporter
        with:
          codacy-api-token: ${{ secrets.CODACY_API_TOKEN }}
          coverage-file: e2e-coverage/lcov.info

  finalize-coverage:
    needs: [ci-fast, ci-integration, ci-e2e]
    if: always() && needs.ci-fast.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Finalize coverage on Codacy
        continue-on-error: true
        uses: ./.github/actions/codacy-reporter
        with:
          codacy-api-token: ${{ secrets.CODACY_API_TOKEN }}
          final: 'true'

  notify-failure:
    needs: [ci-fast, ci-integration, ci-e2e]
    if: failure() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Comment PR on failure
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          gh pr comment "$PR" \
            --repo "$REPO" \
            --body "❌ Build and test workflow failed. Check the [test report](https://github.com/$REPO/actions/runs/$RUN_ID) for details." \
          || true
