name: Build and Test

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping runs per PR / ref
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # Skip on draft PRs
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      MONGODB_URI: mongodb://localhost:27017/cookbook
      BETTER_AUTH_SECRET: ci-test-secret-do-not-use-in-production
      BETTER_AUTH_URL: http://localhost:3000

    services:
      mongodb:
        image: mongo:7
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install

      - name: Commit updated lock file
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update package-lock.json [skip ci]"
            # Only push if the remote branch is still at the SHA this run was triggered by.
            # --force-with-lease=<ref>:<sha> prevents overwriting concurrent pushes.
            git push origin HEAD:${{ github.head_ref }} \
              --force-with-lease=refs/heads/${{ github.head_ref }}:${{ github.event.pull_request.head.sha }}
          else
            echo "package-lock.json is already up to date"
          fi

      - name: Build
        run: npm run build

      - name: Run unit and integration tests with coverage
        run: npm run test -- --coverage

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Seed database
        run: npm run db:seed

      - name: Run E2E tests
        env:
          CI: true
        run: npm run test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

      - name: Upload coverage to Codacy
        if: always()
        env:
          CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
          CODACY_ORGANIZATION_PROVIDER: gh
          CODACY_USERNAME: dougis-org
          CODACY_PROJECT_NAME: cookbook-tanstack
        run: |
          # Install Codacy coverage reporter
          curl -Ls https://coverage.codacy.com/get.sh -o codacy-coverage-reporter.sh
          chmod +x codacy-coverage-reporter.sh

          # Upload coverage report if it exists
          if [ -f coverage/lcov.info ]; then
            ./codacy-coverage-reporter.sh report --partial -l Javascript -r coverage/lcov.info
            ./codacy-coverage-reporter.sh report --partial -l TypeScript -r coverage/lcov.info
            ./codacy-coverage-reporter.sh final
          else
            echo "No coverage report found at coverage/lcov.info"
          fi

      - name: Comment PR on failure
        if: failure() && github.event_name == 'pull_request'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          gh pr comment "$PR" \
            --repo "$REPO" \
            --body "❌ Build and test workflow failed. Check the [test report](https://github.com/$REPO/actions/runs/$RUN_ID) for details."
