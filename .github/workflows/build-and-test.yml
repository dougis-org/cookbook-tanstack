name: Build and Test

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping runs per PR / ref
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # Skip on draft PRs
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      MONGODB_URI: mongodb://localhost:27017/cookbook
      BETTER_AUTH_SECRET: ci-test-secret-do-not-use-in-production
      BETTER_AUTH_URL: http://localhost:3000
      PLAYWRIGHT_CI_WORKERS: 2
      PLAYWRIGHT_RUNTIME_REPORT: playwright-report/results.json

    steps:
      - name: Start MongoDB replica set
        run: |
          docker run -d --name mongodb -p 27017:27017 mongo:7 --replSet rs0 --bind_ip_all
          echo "Waiting for MongoDB to be ready..."
          timeout 60 bash -c 'until docker exec mongodb mongosh --eval "db.adminCommand(\"ping\")" --quiet 2>/dev/null; do sleep 2; done'
          docker exec mongodb mongosh --eval "rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]})"
          echo "Waiting for replica set to elect primary..."
          timeout 30 bash -c 'until docker exec mongodb mongosh --eval "rs.isMaster().ismaster" --quiet 2>/dev/null | grep -q true; do sleep 1; done'

      - name: Checkout
        uses: actions/checkout@v6
        with:
          # For same-repo PRs, check out the PR head SHA so we can commit and push back.
          # For fork PRs and push events, use the default ref (github.ref).
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.sha || github.ref }}
          # Use PAT only for same-repo PRs (where the push-back step runs);
          # fall back to github.token for fork PRs and push events.
          token: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && secrets.WORKFLOW_PAT || github.token }}

      - name: Detect automation-triggered lockfile update
        run: |
          commit_msg="$(git show -s --format=%B)"
          echo "Detected commit message: $commit_msg"
          if echo "$commit_msg" | grep -q "\[ci-auto-lock-update\]"; then
            echo "CI_UPDATED_LOCKFILE=true" >> "$GITHUB_ENV"
          else
            echo "CI_UPDATED_LOCKFILE=false" >> "$GITHUB_ENV"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Commit updated lock file
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        env:
          HEAD_REF: ${{ github.head_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          if ! git diff --cached --quiet; then
            # Mark lockfile auto-updates so triggered workflows can detect them.
            git commit -m "chore: update package-lock.json [ci-auto-lock-update]"
            # Only push if the remote branch is still at the SHA this run was triggered by.
            # --force-with-lease=<ref>:<sha> prevents overwriting concurrent pushes.
            git push origin HEAD:"$HEAD_REF" \
              --force-with-lease=refs/heads/"$HEAD_REF":"$HEAD_SHA"
          else
            echo "package-lock.json is already up to date"
          fi

      - name: Build
        run: npm run build

      - name: Run unit and integration tests with coverage
        run: npm run test -- --coverage

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Seed database
        run: npm run db:seed

      - name: Run E2E tests
        env:
          CI: true
        run: npm run test:e2e

      - name: Run Playwright runtime summary
        if: always()
        run: node scripts/ci/report-playwright-runtime.mjs

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

      - name: Upload coverage to Codacy
        if: always()
        env:
          CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
          CODACY_ORGANIZATION_PROVIDER: gh
          CODACY_USERNAME: dougis-org
          CODACY_PROJECT_NAME: cookbook-tanstack
        run: |
          # Install Codacy coverage reporter
          curl -Ls https://coverage.codacy.com/get.sh -o codacy-coverage-reporter.sh
          chmod +x codacy-coverage-reporter.sh

          partials_uploaded=0

          # Upload Vitest coverage report if it exists
          if [ -f coverage/lcov.info ]; then
            ./codacy-coverage-reporter.sh report --partial -l Javascript -r coverage/lcov.info
            ./codacy-coverage-reporter.sh report --partial -l TypeScript -r coverage/lcov.info
            partials_uploaded=1
          else
            echo "No Vitest coverage report found at coverage/lcov.info"
          fi

          # Upload E2E coverage report if it exists and is non-empty
          # (may be empty when production build lacks source maps for V8 coverage)
          if [ -f e2e-coverage/lcov.info ] && [ -s e2e-coverage/lcov.info ]; then
            ./codacy-coverage-reporter.sh report --partial -l Javascript -r e2e-coverage/lcov.info
            ./codacy-coverage-reporter.sh report --partial -l TypeScript -r e2e-coverage/lcov.info
            partials_uploaded=1
          else
            echo "No E2E coverage report found or file is empty at e2e-coverage/lcov.info"
          fi

          if [ "$partials_uploaded" -eq 1 ]; then
            ./codacy-coverage-reporter.sh final
          else
            echo "No coverage reports were uploaded; skipping final"
          fi

  notify-failure:
    needs: build-and-test
    if: failure() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Comment PR on failure
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          gh pr comment "$PR" \
            --repo "$REPO" \
            --body "❌ Build and test workflow failed. Check the [test report](https://github.com/$REPO/actions/runs/$RUN_ID) for details." \
          || true
